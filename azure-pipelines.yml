trigger:
- main
pool:
  vmImage: 'ubuntu-latest'

variables:
  # Replace these with your actual Azure details
  azureSubscription: 'azurerm'
  webAppName: 'first-azure-devops'

stages:
# 1. BUILD STAGE
- stage: Build
  displayName: 'Build and Package'
  jobs:
  - job: BuildJob
    steps:
    - task: ArchiveFiles@2
      displayName: 'Archive source files'
      inputs:
        rootFolderOrFile: '$(build.sourcesDirectory)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
        replaceExistingArchive: true

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Build Artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'

# 2. DEPLOY STAGE
- stage: Deploy
  displayName: 'Deploy to Azure Web App'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeployWebApp
    steps:
    # This downloads the artifact from the build stage
    - download: current
      artifact: drop

    - task: AzureWebApp@1
      displayName: 'Azure Web App Deploy'
      inputs:
        azureSubscription: '$(azureSubscription)'
        appName: '$(webAppName)'
        appType: 'webAppLinux'
        package: '$(Pipeline.Workspace)/drop' # Deploys the folder contents directly
